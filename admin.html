<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin System | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --cyan: #22d3ee; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; }
        .tech-input { width: 100%; background: black; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.75rem 1rem; color: white; outline: none; transition: 0.3s; }
        .tech-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); }
        .sidebar-item { width: 100%; text-align: left; padding: 0.75rem 1rem; border-radius: 0.5rem; color: #94a3b8; transition: 0.3s; }
        .sidebar-item.active { background: rgba(34, 211, 238, 0.1); color: var(--cyan); }
        .glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-gate" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-6">
        <div class="glass w-full max-w-md p-8 rounded-3xl text-center">
            <h1 class="text-2xl font-bold mb-6">Verification Required</h1>
            <input type="password" id="pin-input" placeholder="ENTER PIN" class="tech-input text-center text-2xl tracking-[0.5em] mb-4">
            <button onclick="login()" id="btn-login" class="w-full bg-cyan-500 text-slate-950 font-bold py-3 rounded-xl hover:bg-cyan-400 transition">LOGIN SYSTEM</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex min-h-screen">
        <aside class="w-64 glass p-6 border-r border-slate-800 hidden lg:flex flex-col">
            <h2 class="text-xl font-bold mb-10 text-cyan-400 mono">ADMIN_PANEL</h2>
            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('project')" id="tab-project" class="sidebar-item active">📁 Projects</button>
                <button onclick="switchTab('certificate')" id="tab-certificate" class="sidebar-item">📜 Certificates</button>
                <button onclick="switchTab('work')" id="tab-work" class="sidebar-item">💼 Experience</button>
                <button onclick="switchTab('education')" id="tab-education" class="sidebar-item">🎓 Education</button>
                <button onclick="switchTab('profile')" id="tab-profile" class="sidebar-item">👤 Profile</button>
            </nav>
            <button onclick="location.reload()" class="text-red-400 text-sm font-bold">LOGOUT</button>
        </aside>

        <main class="flex-1 p-6 lg:p-12 overflow-y-auto">
            <header class="mb-10">
                <h2 id="content-title" class="text-3xl font-bold">Kelola Proyek</h2>
                <p id="content-desc" class="text-slate-400">Update your digital works.</p>
            </header>

            <form onsubmit="handleUpload(event)" class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <div class="xl:col-span-2 space-y-6">
                    <div class="glass p-8 rounded-3xl space-y-6">
                        <div id="form-project" class="space-y-4">
                            <input type="text" id="p-title" class="tech-input" placeholder="Project Name">
                            <textarea id="p-desc" class="tech-input" rows="3" placeholder="Description"></textarea>
                            <input type="url" id="p-link" class="tech-input" placeholder="Live Link">
                            <input type="text" id="p-tech" class="tech-input" placeholder="Tech Stack (comma separated)">
                        </div>
                        <div id="form-certificate" class="hidden space-y-4">
                            <input type="text" id="c-title" class="tech-input" placeholder="Certificate Name">
                            <input type="text" id="c-issuer" class="tech-input" placeholder="Issuer">
                            <input type="number" id="c-year" class="tech-input" placeholder="Year">
                            <input type="url" id="c-link" class="tech-input" placeholder="Verification Link">
                        </div>
                        <div id="form-work" class="hidden space-y-4">
                            <input type="text" id="w-job" class="tech-input" placeholder="Position">
                            <input type="text" id="w-company" class="tech-input" placeholder="Company">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="w-start" class="tech-input" placeholder="Start Year">
                                <input type="text" id="w-end" class="tech-input" placeholder="End Year/Present">
                            </div>
                            <textarea id="w-desc" class="tech-input" rows="3" placeholder="Responsibilities"></textarea>
                        </div>
                        <div id="form-education" class="hidden space-y-4">
                            <input type="text" id="e-major" class="tech-input" placeholder="Major">
                            <input type="text" id="e-school" class="tech-input" placeholder="Institution">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="e-start" class="tech-input" placeholder="Start Year">
                                <input type="number" id="e-end" class="tech-input" placeholder="Graduation Year">
                            </div>
                            <textarea id="e-desc" class="tech-input" rows="2" placeholder="Short description"></textarea>
                        </div>
                        <div id="form-profile" class="hidden space-y-4">
                            <input type="text" id="pr-name" class="tech-input" placeholder="Full Name">
                            <input type="text" id="pr-title" class="tech-input" placeholder="Professional Title">
                            <input type="text" id="pr-skills" class="tech-input" placeholder="Skills (comma separated)">
                            <textarea id="pr-bio" class="tech-input" rows="4" placeholder="Short Bio"></textarea>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="glass p-6 rounded-3xl text-center">
                        <label class="block text-xs font-bold text-slate-500 mb-4 uppercase">Content Media</label>
                        <div id="preview-area" class="hidden mb-4 rounded-xl overflow-hidden border border-slate-700">
                            <img id="image-display" class="w-full aspect-video object-cover">
                        </div>
                        <input type="file" id="main-file" onchange="handlePreview(event)" class="tech-input text-xs">
                    </div>
                    <button type="submit" id="btn-submit" class="w-full bg-cyan-500 text-slate-950 font-bold py-4 rounded-2xl hover:scale-[1.02] transition active:scale-95">UPLOAD CONTENT</button>
                    <p id="status-msg" class="text-center text-[10px] mono font-bold"></p>
                </div>
            </form>
            
            <div id="table-view" class="mt-12 glass p-8 rounded-3xl overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="text-slate-500 uppercase text-[10px] border-b border-slate-800">
                        <tr><th class="pb-4">Entry Name</th><th class="pb-4">Detail</th><th class="pb-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="data-list" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let currentTab = 'project';
        let savedPIN = '';
        const API_URL = 'https://script.google.com/macros/s/AKfycbxhU2uj1xiSoz3I5ur0OenG3L2FS2g9GiXvPdJ6HjrkKGqsluLxiZwcNHPL9SCSRq-cMw/exec';

        async function login() {
            const pin = document.getElementById('pin-input').value;
            const btn = document.getElementById('btn-login');
            btn.innerText = "VERIFYING...";
            
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({pin, kategori: 'verify'}) });
                const result = await res.json();
                if(result.status === 'success') {
                    savedPIN = pin;
                    document.getElementById('login-gate').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    switchTab('project');
                } else { alert('PIN SALAH'); location.reload(); }
            } catch(e) { alert('Error: Check Console'); }
        }

        function switchTab(id) {
            currentTab = id;
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            
            ['form-project', 'form-certificate', 'form-work', 'form-education', 'form-profile'].forEach(f => document.getElementById(f).classList.add('hidden'));
            document.getElementById('form-'+id).classList.remove('hidden');
            
            loadList();
        }

        function handlePreview(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ex) => {
                    document.getElementById('image-display').src = ex.target.result;
                    document.getElementById('preview-area').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        async function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const status = document.getElementById('status-msg');
            btn.disabled = true; status.innerText = "UPLOADING...";

            let payload = { pin: savedPIN, kategori: currentTab, content: {} };
            const fileInput = document.getElementById('main-file');

            if(currentTab === 'project') payload.content = { title: document.getElementById('p-title').value, desc: document.getElementById('p-desc').value, link: document.getElementById('p-link').value, tech: document.getElementById('p-tech').value };
            else if(currentTab === 'certificate') payload.content = { title: document.getElementById('c-title').value, issuer: document.getElementById('c-issuer').value, year: document.getElementById('c-year').value, link: document.getElementById('c-link').value };
            else if(currentTab === 'work') payload.content = { job: document.getElementById('w-job').value, company: document.getElementById('w-company').value, start: document.getElementById('w-start').value, end: document.getElementById('w-end').value, desc: document.getElementById('w-desc').value };
            else if(currentTab === 'education') payload.content = { major: document.getElementById('e-major').value, school: document.getElementById('e-school').value, start: document.getElementById('e-start').value, end: document.getElementById('e-end').value, desc: document.getElementById('e-desc').value };
            else payload.content = { name: document.getElementById('pr-name').value, title: document.getElementById('pr-title').value, skills: document.getElementById('pr-skills').value, bio: document.getElementById('pr-bio').value };

            const send = async (p) => {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) });
                const r = await res.json();
                btn.disabled = false;
                if(r.status === 'success') {
                    status.innerText = "SUCCESS!";
                    document.getElementById('main-form').reset();
                    document.getElementById('preview-area').classList.add('hidden');
                    loadList();
                } else { status.innerText = "ERROR: " + r.message; }
            };

            if(fileInput.files[0]) {
                const r = new FileReader();
                r.onload = (ex) => {
                    payload.fileBase64 = ex.target.result.split(',')[1];
                    payload.fileName = fileInput.files[0].name;
                    payload.mimeType = fileInput.files[0].type;
                    send(payload);
                };
                r.readAsDataURL(fileInput.files[0]);
            } else send(payload);
        }

        async function loadList() {
            const list = document.getElementById('data-list');
            list.innerHTML = '<tr><td colspan="3" class="py-4 text-center animate-pulse">Loading...</td></tr>';
            const tabMap = {project:'Project', certificate:'Sertifikat', work:'Work', education:'Education', profile:'Profile'};
            
            try {
                const res = await fetch(`${API_URL}?tab=${tabMap[currentTab]}`);
                const data = await res.json();
                list.innerHTML = data.map(item => {
                    const title = item['Nama Project'] || item['Nama Sertifikat'] || item['Posisi'] || item['Jurusan'] || item['Nama Lengkap'];
                    const detail = item['Teknologi'] || item['Penerbit'] || item['Perusahaan'] || item['Kampus'] || item['Title'];
                    return `<tr><td class="py-4 font-bold">${title}</td><td class="text-slate-400">${detail}</td><td class="text-right"><button onclick="deleteRow('${tabMap[currentTab]}','${title}')" class="text-red-500">DELETE</button></td></tr>`;
                }).join('');
            } catch(e) { list.innerHTML = ''; }
        }

        async function deleteRow(tab, id) {
            if(!confirm('Hapus data ini?')) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({pin: savedPIN, kategori: 'delete', tab, id}) });
            loadList();
        }
    </script>
</body>
</html>
